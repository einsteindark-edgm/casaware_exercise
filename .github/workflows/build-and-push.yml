name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "nexus-orchestration/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to build (backend, frontend, worker, or all)"
        type: choice
        options: [all, backend, frontend, worker]
        default: all

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "525237381234"
  ECS_CLUSTER: nexus-dev-edgm
  IAM_ROLE_ARN: arn:aws:iam::525237381234:role/nexus-dev-edgm-gha-terraform

jobs:
  detect:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      worker: ${{ steps.changes.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            svc="${{ inputs.service }}"
            echo "backend=$([ "$svc" = "all" ] || [ "$svc" = "backend" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "frontend=$([ "$svc" = "all" ] || [ "$svc" = "frontend" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "worker=$([ "$svc" = "all" ] || [ "$svc" = "worker" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only HEAD^ HEAD | grep -q '^backend/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD^ HEAD | grep -q '^frontend/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD^ HEAD | grep -q '^nexus-orchestration/'; then
            echo "worker=true" >> $GITHUB_OUTPUT
          else
            echo "worker=false" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: build ${{ matrix.service }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
          - service: frontend
            context: frontend
          # Worker (nexus-orchestration): build context is the package dir, but
          # the ECS service / ECR repo / task-def family are all "worker".
          - service: worker
            context: nexus-orchestration
    steps:
      - name: skip if not changed
        id: gate
        run: |
          case "${{ matrix.service }}" in
            backend)  changed="${{ needs.detect.outputs.backend }}" ;;
            frontend) changed="${{ needs.detect.outputs.frontend }}" ;;
            worker)   changed="${{ needs.detect.outputs.worker }}" ;;
          esac
          echo "changed=$changed" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.gate.outputs.changed == 'true'

      - name: configure aws credentials
        if: steps.gate.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ecr login
        if: steps.gate.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: fetch frontend build-args from SSM (frontend only)
        if: steps.gate.outputs.changed == 'true' && matrix.service == 'frontend'
        id: ssm
        run: |
          # -e: fail on any error (including SSM AccessDenied). Without this,
          # a silent empty SSM read would bake NEXT_PUBLIC_*="" into the bundle
          # and produce "Auth UserPool not configured" in the browser.
          # -u: catch typos in var names. -o pipefail: surface errors in pipes.
          set -euo pipefail

          get() {
            local name="$1"
            local value
            value=$(aws ssm get-parameter --name "$name" --query 'Parameter.Value' --output text)
            if [ -z "$value" ] || [ "$value" = "None" ]; then
              echo "::error::SSM parameter $name is empty or missing" >&2
              exit 1
            fi
            echo "$value"
          }

          pool_id=$(get /nexus-dev-edgm/cognito_user_pool_id)
          client_id=$(get /nexus-dev-edgm/cognito_client_id)
          ALB_URL="${APP_PUBLIC_URL:-http://nexus-dev-edgm-alb-1027640062.us-east-1.elb.amazonaws.com}"

          echo "pool_id=$pool_id" >> $GITHUB_OUTPUT
          echo "client_id=$client_id" >> $GITHUB_OUTPUT
          echo "app_url=$ALB_URL" >> $GITHUB_OUTPUT

      - name: docker build + push (backend)
        if: steps.gate.outputs.changed == 'true' && matrix.service == 'backend'
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/nexus-dev-edgm-${{ matrix.service }}
        working-directory: ${{ matrix.context }}
        run: |
          docker build -t "$REPO:$IMAGE_TAG" .
          docker push "$REPO:$IMAGE_TAG"

      - name: docker build + push (worker, linux/amd64 single-arch)
        if: steps.gate.outputs.changed == 'true' && matrix.service == 'worker'
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/nexus-dev-edgm-${{ matrix.service }}
        working-directory: ${{ matrix.context }}
        run: |
          # --provenance=false prevents BuildKit from producing a manifest list,
          # which ECR rejects on IMMUTABLE repos. --platform locks the arch to
          # Fargate's runtime (linux/amd64).
          docker build --platform linux/amd64 --provenance=false \
            -t "$REPO:$IMAGE_TAG" .
          docker push "$REPO:$IMAGE_TAG"

      - name: docker build + push (frontend, with NEXT_PUBLIC_* build-args)
        if: steps.gate.outputs.changed == 'true' && matrix.service == 'frontend'
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/nexus-dev-edgm-${{ matrix.service }}
        working-directory: ${{ matrix.context }}
        run: |
          set -euo pipefail

          # Defensive: abort before docker build if any required NEXT_PUBLIC
          # build-arg resolved to empty. These get baked into the client
          # bundle at compile time — once the image is pushed the value is
          # frozen, so we must fail the build loudly instead of producing
          # a broken deployment.
          : "${{ steps.ssm.outputs.pool_id   }}"
          : "${{ steps.ssm.outputs.client_id }}"
          : "${{ steps.ssm.outputs.app_url   }}"

          docker build \
            --build-arg NEXT_PUBLIC_AUTH_MODE=prod \
            --build-arg NEXT_PUBLIC_APP_URL="${{ steps.ssm.outputs.app_url }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.ssm.outputs.app_url }}" \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID="${{ steps.ssm.outputs.pool_id }}" \
            --build-arg NEXT_PUBLIC_COGNITO_APP_CLIENT_ID="${{ steps.ssm.outputs.client_id }}" \
            --build-arg NEXT_PUBLIC_COGNITO_DOMAIN="nexus-dev-edgm-auth.auth.${{ env.AWS_REGION }}.amazoncognito.com" \
            -t "$REPO:$IMAGE_TAG" .
          docker push "$REPO:$IMAGE_TAG"

      - name: render new task definition revision
        if: steps.gate.outputs.changed == 'true'
        id: td
        run: |
          aws ecs describe-task-definition \
            --task-definition "nexus-dev-edgm-${{ matrix.service }}" \
            --query "taskDefinition" \
          | jq --arg img "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/nexus-dev-edgm-${{ matrix.service }}:${{ github.sha }}" '
              .containerDefinitions[0].image = $img
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            ' > td.json
          aws ecs register-task-definition --cli-input-json file://td.json > out.json
          td_arn=$(jq -r '.taskDefinition.taskDefinitionArn' out.json)
          echo "td_arn=$td_arn" >> $GITHUB_OUTPUT

      - name: update service to new revision
        if: steps.gate.outputs.changed == 'true'
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "nexus-dev-edgm-${{ matrix.service }}" \
            --task-definition "${{ steps.td.outputs.td_arn }}"
