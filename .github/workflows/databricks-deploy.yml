name: databricks-deploy

on:
  push:
    branches: [main]
    paths:
      - "nexus-medallion/**"
      - ".github/workflows/databricks-deploy.yml"
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Run silver+gold with --full-refresh-all after deploy"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IAM_ROLE_ARN: arn:aws:iam::525237381234:role/nexus-dev-edgm-gha-terraform

jobs:
  deploy:
    name: bundle deploy (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-medallion
    steps:
      - uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: fetch databricks host + token from Secrets Manager
        id: dbx
        run: |
          set -euo pipefail
          host=$(aws secretsmanager get-secret-value \
            --secret-id nexus-dev-edgm/databricks_host \
            --query SecretString --output text)
          token=$(aws secretsmanager get-secret-value \
            --secret-id nexus-dev-edgm/databricks_token \
            --query SecretString --output text)
          # Mask before exporting.
          echo "::add-mask::$token"
          echo "DATABRICKS_HOST=$host" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=$token" >> $GITHUB_ENV

      - name: install databricks cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: bundle validate
        run: databricks bundle validate --target dev

      - name: bundle deploy
        run: databricks bundle deploy --target dev

      # Post-deploy fix: el Databricks CLI v0.298.x tiene un bug donde no
      # propaga `continuous: true` del YAML al spec deployado (sí propaga
      # false). Como el bronze pipeline DEBE estar en continuous para que
      # la latencia Mongo→Bronze sea sub-segundos (ver
      # mds/13-pipeline-modes-y-escalamiento.md), forzamos el flag vía API
      # después del deploy. Idempotente: si el bundle ya lo aplicó bien
      # (cuando arreglen el bug), este step es un no-op.
      - name: ensure bronze pipeline is continuous
        run: |
          set -euo pipefail
          bronze_id=$(databricks pipelines list-pipelines --output json \
            | jq -r '.[] | select(.name | endswith("nexus-bronze-cdc-nexus_dev")) | .pipeline_id')
          if [ -z "$bronze_id" ]; then
            echo "::error::could not resolve bronze pipeline id"
            exit 1
          fi
          current=$(databricks pipelines get "$bronze_id" --output json | jq -r '.spec.continuous // false')
          echo "bronze pipeline_id=$bronze_id current continuous=$current"
          if [ "$current" = "true" ]; then
            echo "already continuous=true, no-op"
          else
            databricks pipelines get "$bronze_id" --output json \
              | jq '.spec | .id = "'"$bronze_id"'" | .continuous = true' > /tmp/bronze_spec.json
            databricks pipelines update "$bronze_id" --json @/tmp/bronze_spec.json
            echo "forced continuous=true on bronze pipeline"
          fi
          # Export for next step.
          echo "BRONZE_PIPELINE_ID=$bronze_id" >> $GITHUB_ENV

      # `bundle deploy` SIEMPRE cancela el update activo del pipeline al
      # re-aplicar el spec (cambie o no). Despues queda IDLE y `continuous=true`
      # NO se auto-arranca desde IDLE — significa "queda vivo cuando arranca",
      # no "se restartea solo". Si no disparamos start-update aca, bronze queda
      # apagado entre push y push, los CDC events de Mongo se acumulan en
      # Kafka sin consumirse, y silver/gold no producen nada hasta el siguiente
      # arranque manual. Idempotente: si ya esta RUNNING/STARTING, no-op.
      - name: ensure bronze pipeline is running
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            state=$(databricks pipelines get "$BRONZE_PIPELINE_ID" --output json | jq -r '.state')
            echo "bronze state=$state (intento $i/6)"
            case "$state" in
              RUNNING|STARTING|RESETTING|DEPLOYING)
                echo "already active, no start-update needed"
                exit 0
                ;;
              IDLE|FAILED)
                echo "bronze esta $state → start-update"
                databricks pipelines start-update "$BRONZE_PIPELINE_ID" \
                  --full-refresh-all=false
                # Wait briefly for transition.
                sleep 10
                new_state=$(databricks pipelines get "$BRONZE_PIPELINE_ID" --output json | jq -r '.state')
                echo "bronze post-start state=$new_state"
                if [ "$new_state" = "RUNNING" ] || [ "$new_state" = "STARTING" ]; then
                  exit 0
                fi
                ;;
              *)
                # STOPPING / RECOVERING / etc — esperar y reintentar.
                sleep 10
                ;;
            esac
          done
          echo "::warning::bronze no llego a RUNNING tras 6 intentos, chequea UI"

      - name: full-refresh silver + gold (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.full_refresh
        run: |
          set -euo pipefail
          # Resolve pipeline IDs by name — bundle deploy creates them with
          # deterministic names: nexus-silver-${catalog}, nexus-gold-${catalog}.
          silver_id=$(databricks pipelines list-pipelines --output json \
            | jq -r '.[] | select(.name == "nexus-silver-nexus_dev") | .pipeline_id')
          gold_id=$(databricks pipelines list-pipelines --output json \
            | jq -r '.[] | select(.name == "nexus-gold-nexus_dev") | .pipeline_id')
          if [ -z "$silver_id" ] || [ -z "$gold_id" ]; then
            echo "::error::could not resolve silver/gold pipeline ids"
            exit 1
          fi
          echo "silver_id=$silver_id gold_id=$gold_id"
          databricks pipelines start-update "$silver_id" --full-refresh-all
          databricks pipelines start-update "$gold_id" --full-refresh-all
