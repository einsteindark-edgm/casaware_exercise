resources:
  pipelines:
    bronze_cdc_pipeline:
      name: "nexus-bronze-cdc-${var.catalog}"
      catalog: ${var.catalog}
      target: "bronze"
      # Phase B+: continuous=true. Los notebooks leen Kafka (MSK) en streaming,
      # sin timer externo. Latencia Mongo → bronze ≈ 3s.
      continuous: true
      development: true
      serverless: true

      libraries:
        - notebook:
            path: ../../src/bronze/cdc_expenses.py
        - notebook:
            path: ../../src/bronze/cdc_receipts.py
        - notebook:
            path: ../../src/bronze/cdc_hitl_tasks.py
        - notebook:
            path: ../../src/bronze/cdc_ocr_extractions.py
        - notebook:
            path: ../../src/bronze/cdc_expense_events.py

      configuration:
        nexus.catalog: ${var.catalog}
        # Bootstrap brokers del cluster MSK (output de terraform msk.tf).
        nexus.msk_bootstrap: ${var.msk_bootstrap_servers}

      # UC Service Credential que expone el IAM role para MSK SASL IAM auth.
      # Se registra en databricks_msk.tf y se usa a nivel de pipeline:
      # las opciones kafka.sasl.* de cada notebook se firman con estas creds.
      credentials:
        - name: ${var.msk_service_credential}
