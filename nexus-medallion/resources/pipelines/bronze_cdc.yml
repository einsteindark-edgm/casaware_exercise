resources:
  pipelines:
    bronze_cdc_pipeline:
      name: "nexus-bronze-cdc-${var.catalog}"
      catalog: ${var.catalog}
      target: "bronze"
      # Phase B+++: DLT Classic continuous. DLT Serverless no soporta NCC
      # PrivateLink (gated por Databricks support). Classic compute corre
      # en la VPC del workspace (customer-managed) → peering con la VPC
      # de MSK + Route53 Resolver (ver infra/terraform/vpc_peering.tf).
      #
      # 2026-04-26: pasamos a continuous para eliminar el cuello de botella
      # Mongo→Bronze. Debezium ya entrega a Kafka en ms, pero antes el
      # bronze solo se encendía cada 10 min (cron del job cdc_refresh) +
      # 2-4 min de cold start = 10-14 min worst case. En continuous el
      # cluster m5.large queda 24/7 leyendo los 5 streams Kafka, latencia
      # Mongo→Bronze cae a <5s. El task `bronze_cdc` se removió del job
      # cdc_refresh (ahora solo orquesta silver→gold cada 1 min).
      # Ver mds/13-pipeline-modes-y-escalamiento.md.
      continuous: true
      development: true
      serverless: false

      clusters:
        - label: default
          # m5.large: 2 vCPU / 8 GB. Suficiente para 5 streaming sources
          # con bajo volumen en dev. ~$0.096/hr.
          node_type_id: m5.large
          autoscale:
            min_workers: 1
            max_workers: 2
            mode: ENHANCED
          # NOTA: en Lakeflow Declarative Pipelines la versión del runtime la
          # gestiona DLT (campo `channel` a nivel de pipeline si quieres
          # forzar PREVIEW|CURRENT). `spark_version` aquí es ignorado y el
          # bundle CLI lo marca como "unknown field".

      libraries:
        - notebook:
            path: ../../src/bronze/cdc_expenses.py
        - notebook:
            path: ../../src/bronze/cdc_receipts.py
        - notebook:
            path: ../../src/bronze/cdc_hitl_tasks.py
        - notebook:
            path: ../../src/bronze/cdc_ocr_extractions.py
        - notebook:
            path: ../../src/bronze/cdc_expense_events.py

      configuration:
        nexus.catalog: ${var.catalog}
        nexus.msk_bootstrap: ${var.msk_bootstrap_servers}
        # El UC Service Credential firma SASL IAM cuando el notebook
        # pasa .option("databricks.serviceCredential", <name>). Sin ese
        # option, el cliente Kafka cae en la AWS SDK default chain y
        # falla con "Unable to load AWS credentials" porque el cluster
        # classic no tiene instance profile (correcto: queremos auth
        # por UC, no por instance profile).
        nexus.msk_service_credential: ${var.msk_service_credential}
        # El UC Service Credential se referencia por NOMBRE desde el código
        # (ver `cdc_*.py`). No hay un campo `credentials` a nivel de pipeline
        # en el bundle schema — se ataba aquí antes y el CLI lo marcaba como
        # "unknown field". Lo quitamos; la credential sigue funcionando porque
        # el notebook pasa el name vía `.option("databricks.serviceCredential", ...)`.
