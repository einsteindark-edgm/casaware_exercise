resources:
  jobs:
    nexus_cdc_refresh:
      name: "nexus-cdc-refresh-${var.catalog}"
      description: >-
        Phase B+: bronze_cdc_pipeline ahora es continuous (lee Kafka MSK en
        streaming, sin trigger externo). Este job solo agenda silver y gold,
        que siguen siendo triggered para ahorrar costos — cada 15 min.

      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      tasks:
        - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.silver_pipeline.id}"
            full_refresh: false

        - task_key: gold
          depends_on:
            - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.gold_pipeline.id}"
            full_refresh: false

      max_concurrent_runs: 1
