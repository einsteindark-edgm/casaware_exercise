resources:
  jobs:
    nexus_cdc_refresh:
      name: "nexus-cdc-refresh-${var.catalog}"
      description: >-
        2026-04-26: bronze pasó a continuous (siempre vivo leyendo Kafka).
        Este job ya solo orquesta silver→gold cada 1 min, porque silver
        y gold tienen materialized views que no soportan continuous con
        serverless (gated). Latencia Mongo→Gold esperada: ~2 min worst case.
        Ver mds/13-pipeline-modes-y-escalamiento.md.

      schedule:
        quartz_cron_expression: "0 * * * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      tasks:
        - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.silver_pipeline.id}"
            full_refresh: false

        - task_key: gold
          depends_on:
            - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.gold_pipeline.id}"
            full_refresh: false

      max_concurrent_runs: 1
