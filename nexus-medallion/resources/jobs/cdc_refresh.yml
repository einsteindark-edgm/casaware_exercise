resources:
  jobs:
    nexus_cdc_refresh:
      name: "nexus-cdc-refresh-${var.catalog}"
      description: >-
        Triggered cada 5 min. Corre el pipeline bronze_cdc (Autoloader
        consume los nuevos archivos en s3://{cdc_bucket}/...), despues
        refresca silver y gold, y al final hace sync del index VS.

      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      tasks:
        - task_key: bronze_cdc
          pipeline_task:
            pipeline_id: "${resources.pipelines.bronze_cdc_pipeline.id}"
            full_refresh: false

        - task_key: silver
          depends_on:
            - task_key: bronze_cdc
          pipeline_task:
            pipeline_id: "${resources.pipelines.silver_pipeline.id}"
            full_refresh: false

        - task_key: gold
          depends_on:
            - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.gold_pipeline.id}"
            full_refresh: false

      max_concurrent_runs: 1
