resources:
  jobs:
    nexus_cdc_refresh:
      name: "nexus-cdc-refresh-${var.catalog}"
      description: >-
        Phase B+++: bronze ahora es DLT Classic triggered (no continuous).
        Schedule cada 10 min: bronze (Kafka → bronze) → silver → gold.
        Latencia Mongo → bronze ≈ 10 min trigger + 2-4 min cluster startup
        + ~30s ingestion = ~12-14 min worst case en dev.

      schedule:
        quartz_cron_expression: "0 */10 * * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"

      tasks:
        - task_key: bronze_cdc
          pipeline_task:
            pipeline_id: "${resources.pipelines.bronze_cdc_pipeline.id}"
            full_refresh: false

        - task_key: silver
          depends_on:
            - task_key: bronze_cdc
          pipeline_task:
            pipeline_id: "${resources.pipelines.silver_pipeline.id}"
            full_refresh: false

        - task_key: gold
          depends_on:
            - task_key: silver
          pipeline_task:
            pipeline_id: "${resources.pipelines.gold_pipeline.id}"
            full_refresh: false

      max_concurrent_runs: 1
