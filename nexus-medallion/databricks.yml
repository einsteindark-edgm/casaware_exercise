# Databricks Asset Bundle — Nexus Medallion
# Deploys Lakeflow pipelines (silver, gold) + one-shot jobs (seed, vector setup)
# to the nexus_<env> Unity Catalog.

bundle:
  name: nexus-medallion

include:
  - resources/pipelines/*.yml
  - resources/jobs/*.yml

variables:
  catalog:
    description: "Unity Catalog name (nexus_dev / nexus_prod)."
    default: "nexus_dev"
  mongodb_uri_secret_scope:
    description: "Databricks secret scope that holds 'mongodb_uri'."
    default: "nexus"
  mongodb_db:
    description: "MongoDB database name to seed from."
    default: "nexus_dev"
  msk_bootstrap_servers:
    description: "MSK Serverless bootstrap brokers (puerto 9098, IAM SASL). Output de terraform msk.tf."
    default: ""
  msk_service_credential:
    description: "UC Service Credential name que el pipeline usa para firmar SASL IAM. Output de databricks_msk.tf."
    default: "nexus-dev-edgm-msk-cred"

targets:
  dev:
    # NO usamos `mode: development` porque el CLI aplica un mutator hard-coded
    # que sobreescribe `continuous: false` a TODOS los pipelines, ignorando
    # incluso los overrides al nivel de target. En su lugar replicamos los
    # comportamientos de `mode: development` que sí queremos (prefix de
    # nombres y development=true en pipelines) vía `presets` manuales — esos
    # sí respetan los overrides del recurso. Ver mds/13-pipeline-modes-y-escalamiento.md.
    default: true
    workspace:
      host: https://dbc-01d95494-7b54.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    presets:
      name_prefix: "[dev ${workspace.current_user.short_name}] "
      pipelines_development: true
      trigger_pause_status: PAUSED
      tags:
        dev: ${workspace.current_user.short_name}
    variables:
      catalog: "nexus_dev"
      mongodb_db: "nexus_dev"
      msk_bootstrap_servers: "b-1.nexusdevedgmkafkaprov.ygf4z6.c23.kafka.us-east-1.amazonaws.com:9098,b-2.nexusdevedgmkafkaprov.ygf4z6.c23.kafka.us-east-1.amazonaws.com:9098"
      msk_service_credential: "nexus-dev-edgm-msk-cred"

  prod:
    mode: production
    workspace:
      host: https://dbc-01d95494-7b54.cloud.databricks.com
    variables:
      catalog: "nexus_prod"
      mongodb_db: "nexus_prod"
      msk_bootstrap_servers: ""
      msk_service_credential: "nexus-prod-edgm-msk-cred"
