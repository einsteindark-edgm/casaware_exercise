# Databricks Asset Bundle — Nexus Medallion
# Deploys Lakeflow pipelines (silver, gold) + one-shot jobs (seed, vector setup)
# to the nexus_<env> Unity Catalog.

bundle:
  name: nexus-medallion

include:
  - resources/pipelines/*.yml
  - resources/jobs/*.yml

variables:
  catalog:
    description: "Unity Catalog name (nexus_dev / nexus_prod)."
    default: "nexus_dev"
  mongodb_uri_secret_scope:
    description: "Databricks secret scope that holds 'mongodb_uri'."
    default: "nexus"
  mongodb_db:
    description: "MongoDB database name to seed from."
    default: "nexus_dev"
  msk_bootstrap_servers:
    description: "MSK Serverless bootstrap brokers (puerto 9098, IAM SASL). Output de terraform msk.tf."
    default: ""
  msk_service_credential:
    description: "UC Service Credential name que el pipeline usa para firmar SASL IAM. Output de databricks_msk.tf."
    default: "nexus-dev-edgm-msk-cred"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-cd7c46c8-d871.cloud.databricks.com
    variables:
      catalog: "nexus_dev"
      mongodb_db: "nexus_dev"
      msk_bootstrap_servers: "boot-lddwjvb7.c2.kafka-serverless.us-east-1.amazonaws.com:9098"
      msk_service_credential: "nexus-dev-edgm-msk-cred"

  prod:
    mode: production
    workspace:
      host: https://dbc-cd7c46c8-d871.cloud.databricks.com
    variables:
      catalog: "nexus_prod"
      mongodb_db: "nexus_prod"
      msk_bootstrap_servers: ""
      msk_service_credential: "nexus-prod-edgm-msk-cred"
