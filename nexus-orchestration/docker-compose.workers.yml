# Requires the backend's docker-compose.dev.yml to be running first.
# It creates the `backend_default` network (compose auto-names from project
# directory) — we attach here as external.
#
# Usage:
#   cd ../backend && docker compose -f docker-compose.dev.yml up -d
#   cd ../nexus-orchestration && docker compose -f docker-compose.workers.yml up --build

x-worker-base: &worker-base
  build: .
  env_file:
    - .env
  environment: &worker-env
    # Container-internal networking — always overrides whatever is in .env.
    ENV: dev
    TEMPORAL_HOST: temporal:7233
    TEMPORAL_NAMESPACE: default
    # MONGODB_URI intentionally NOT overridden so Atlas URI from .env wins.
    MONGODB_DB: nexus_dev
    REDIS_URL: redis://redis:6379/0
    REDIS_TLS: "false"
    AUDIT_SOURCE: mongo
    LOG_LEVEL: INFO
  networks:
    - backend-net
  restart: unless-stopped

services:
  worker-orchestrator:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-orchestrator-tq

  worker-ocr:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-ocr-tq

  worker-databricks:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-databricks-tq

  worker-rag:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-rag-tq

networks:
  backend-net:
    external: true
    # Docker Compose auto-names the network `<project>_default`. Override here
    # if the backend was started with a different project name.
    name: backend_default
