# Requires the backend's docker-compose.dev.yml to be running first.
# It creates the `backend_default` network (compose auto-names from project
# directory) — we attach here as external.
#
# Usage:
#   cd ../backend && docker compose -f docker-compose.dev.yml up -d
#   cd ../nexus-orchestration && docker compose -f docker-compose.workers.yml up --build

x-worker-base: &worker-base
  build: .
  environment: &worker-env
    ENV: dev
    AWS_REGION: us-east-1
    TEMPORAL_HOST: temporal:7233
    TEMPORAL_NAMESPACE: default
    MONGODB_URI: mongodb://mongo:27017/?replicaSet=rs0&directConnection=true
    MONGODB_DB: nexus_dev
    REDIS_URL: redis://redis:6379/0
    REDIS_TLS: "false"
    S3_RECEIPTS_BUCKET: nexus-receipts-dev
    S3_TEXTRACT_OUTPUT_BUCKET: nexus-textract-output-dev
    AWS_ENDPOINT_URL: http://localstack:4566
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    FAKE_PROVIDERS: "true"
    FAKE_HITL_MODE: ${FAKE_HITL_MODE:-force}
    AUDIT_SOURCE: mongo
    LOG_LEVEL: INFO
  networks:
    - backend-net
  restart: unless-stopped

services:
  worker-orchestrator:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-orchestrator-tq

  worker-ocr:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-ocr-tq

  worker-databricks:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-databricks-tq

  worker-rag:
    <<: *worker-base
    environment:
      <<: *worker-env
      TASK_QUEUE: nexus-rag-tq

networks:
  backend-net:
    external: true
    # Docker Compose auto-names the network `<project>_default`. Override here
    # if the backend was started with a different project name.
    name: backend_default
